<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDK 管理</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #eef2ef;
            --panel: rgba(255, 253, 248, 0.94);
            --line: rgba(24, 38, 33, 0.12);
            --ink: #13211c;
            --muted: #5d6964;
            --accent: #0c6b5b;
            --accent-strong: #094e42;
            --danger: #b23333;
            --shadow: 0 28px 70px rgba(20, 33, 29, 0.13);
        }
        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            color: var(--ink);
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background:
                linear-gradient(135deg, rgba(12, 107, 91, 0.11), transparent 33%),
                linear-gradient(320deg, rgba(154, 100, 16, 0.08), transparent 30%),
                var(--bg);
        }
        main {
            width: min(1080px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 16px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 22px;
            backdrop-filter: blur(10px);
        }
        .top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: end;
        }
        h1, h2 {
            margin: 0 0 8px;
            letter-spacing: 0;
        }
        h1 { font-size: clamp(28px, 4vw, 42px); line-height: 1.06; }
        h2 { font-size: 22px; }
        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.75;
        }
        a {
            color: var(--accent-strong);
            text-decoration: none;
            font-weight: 800;
        }
        a:hover { text-decoration: underline; }
        form { display: grid; gap: 14px; }
        .login-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: end;
        }
        .grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 12px;
        }
        label {
            display: grid;
            gap: 7px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }
        input, textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            color: var(--ink);
            padding: 13px 14px;
            font-size: 15px;
            outline: none;
        }
        textarea {
            min-height: 128px;
            resize: vertical;
            line-height: 1.65;
        }
        input:focus, textarea:focus {
            border-color: rgba(12, 107, 91, 0.45);
            box-shadow: 0 0 0 3px rgba(12, 107, 91, 0.12);
        }
        .check-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 800;
        }
        .check-row input { width: auto; }
        button {
            border: 0;
            border-radius: 8px;
            background: linear-gradient(180deg, var(--accent), var(--accent-strong));
            color: #fff;
            padding: 14px 18px;
            min-height: 46px;
            font-weight: 900;
            cursor: pointer;
            white-space: nowrap;
        }
        button.secondary {
            background: #e7f2ee;
            color: var(--accent-strong);
            border: 1px solid rgba(12, 107, 91, 0.18);
        }
        button.danger { background: var(--danger); }
        button:disabled { opacity: .62; cursor: not-allowed; }
        .actions, .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 14px;
            margin-top: 12px;
            line-height: 1.6;
        }
        .status.success { color: var(--accent-strong); }
        .status.error { color: var(--danger); }
        .hide { display: none; }
        #cdkList {
            display: grid;
            gap: 14px;
            margin-top: 16px;
        }
        .cdk-record {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: stretch;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
            background: linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(238, 246, 243, 0.94));
            box-shadow: 0 18px 42px rgba(20, 33, 29, 0.08);
        }
        .record-main {
            min-width: 0;
            display: grid;
            gap: 12px;
        }
        .record-head {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .record-code {
            display: inline-flex;
            max-width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(12, 107, 91, 0.18);
            border-radius: 8px;
            background: rgba(231, 242, 238, 0.86);
            color: var(--accent-strong);
            font-weight: 900;
            font-size: clamp(20px, 3vw, 30px);
            line-height: 1.12;
            letter-spacing: 0.03em;
            word-break: break-all;
            user-select: all;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid rgba(12, 107, 91, 0.18);
            background: #e7f2ee;
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 900;
        }
        .status-pill.off {
            border-color: rgba(178, 51, 51, 0.2);
            background: #fae8e8;
            color: var(--danger);
        }
        .sale-select {
            min-height: 34px;
            border: 1px solid rgba(12, 107, 91, 0.18);
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            padding: 0 34px 0 11px;
            font-size: 13px;
            font-weight: 900;
            outline: none;
        }
        .sale-select:focus {
            border-color: rgba(12, 107, 91, 0.45);
            box-shadow: 0 0 0 3px rgba(12, 107, 91, 0.12);
        }
        .sale-select.sold {
            border-color: rgba(178, 51, 51, 0.24);
            background: #fff6f6;
            color: var(--danger);
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }
        .summary-cell {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 12px;
        }
        .summary-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .summary-value {
            color: var(--ink);
            font-size: 14px;
            font-weight: 800;
            line-height: 1.45;
            word-break: break-word;
        }
        .content-preview {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .record-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .empty {
            color: var(--muted);
            padding: 12px 0;
        }
        @media (max-width: 800px) {
            body { padding: 16px; }
            .panel { padding: 18px; }
            .top, .login-grid, .grid, .cdk-record, .actions, .toolbar {
                grid-template-columns: 1fr;
                display: grid;
            }
            .summary-grid { grid-template-columns: 1fr; }
            .record-actions {
                display: grid;
                grid-template-columns: 1fr;
                justify-content: stretch;
            }
            button { width: 100%; }
        }
    </style>
    <link rel="stylesheet" href="./assets/app.css" />
</head>
<body>
    <main>
        <section class="panel top">
            <div>
                <h1>CDK 管理</h1>
                <p>维护 CDK 和用户验证成功后可查看的信息。</p>
            </div>
            <div class="toolbar">
                <a href="./cdk.html">用户提取页</a>
                <a href="./admin.html">邮箱管理</a>
                <a href="./index.html">返回查询页</a>
            </div>
        </section>

        <section class="panel">
            <h2>管理员登录</h2>
            <form id="loginForm" autocomplete="off">
                <div class="login-grid">
                    <label>管理员密码
                        <input id="adminPassword" type="password" autocomplete="new-password" required />
                    </label>
                    <button id="loadBtn" type="submit">登录</button>
                </div>
            </form>
            <div id="status" class="status">等待登录。</div>
        </section>

        <section id="managePanel" class="panel hide">
            <h2>添加或更新 CDK</h2>
            <form id="cdkForm" autocomplete="off">
                <div class="grid">
                    <label>CDK
                        <input id="cdkInput" type="text" autocomplete="off" spellcheck="false" placeholder="保存后系统自动生成" readonly />
                    </label>
                    <label>标题
                        <input id="titleInput" type="text" autocomplete="off" placeholder="提取信息" required />
                    </label>
                </div>
                <label>可查看信息
                    <textarea id="contentInput" required placeholder="用户验证 CDK 后会看到这里的内容。"></textarea>
                </label>
                <label class="check-row">
                    <input id="enabledInput" type="checkbox" checked />
                    启用这个 CDK
                </label>
                <div class="actions">
                    <button id="saveBtn" type="submit">保存 CDK</button>
                    <button id="clearBtn" class="secondary" type="button">清空表单</button>
                </div>
            </form>
        </section>

        <section id="listPanel" class="panel hide">
            <h2>已配置 CDK</h2>
            <div id="cdkList" class="cdk-list"></div>
        </section>
    </main>

    <script>
        const loginForm = document.getElementById("loginForm");
        const cdkForm = document.getElementById("cdkForm");
        const adminPasswordInput = document.getElementById("adminPassword");
        const cdkInput = document.getElementById("cdkInput");
        const titleInput = document.getElementById("titleInput");
        const contentInput = document.getElementById("contentInput");
        const enabledInput = document.getElementById("enabledInput");
        const loadBtn = document.getElementById("loadBtn");
        const saveBtn = document.getElementById("saveBtn");
        const clearBtn = document.getElementById("clearBtn");
        const statusEl = document.getElementById("status");
        const managePanel = document.getElementById("managePanel");
        const listPanel = document.getElementById("listPanel");
        const cdkList = document.getElementById("cdkList");
        let currentAdminPassword = "";

        function setStatus(type, message) {
            statusEl.className = "status" + (type ? " " + type : "");
            statusEl.textContent = message;
        }

        async function readJsonResponse(response) {
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (_) {
                const decoder = new TextDecoder();
                const encoded = new TextEncoder().encode(text);
                let depth = 0;
                let inString = false;
                let escaped = false;
                for (let i = 0; i < encoded.length; i++) {
                    const char = decoder.decode(encoded.slice(i, i + 1));
                    if (escaped) {
                        escaped = false;
                        continue;
                    }
                    if (char === "\\") {
                        escaped = inString;
                        continue;
                    }
                    if (char === "\"") {
                        inString = !inString;
                        continue;
                    }
                    if (inString) continue;
                    if (char === "{") depth++;
                    if (char === "}") depth--;
                    if (depth === 0 && i > 0) {
                        try {
                            return JSON.parse(decoder.decode(encoded.slice(0, i + 1)));
                        } catch (_) {}
                    }
                }
                const detail = text.trim().slice(0, 160);
                throw new Error(detail ? `接口返回异常：${detail}` : "接口返回异常，请检查服务器日志。");
            }
        }

        function selectElementText(element) {
            if (!element) return false;
            const selection = window.getSelection && window.getSelection();
            if (!selection) return false;

            const range = document.createRange();
            range.selectNodeContents(element);
            selection.removeAllRanges();
            selection.addRange(range);
            return true;
        }

        async function copyText(text, sourceElement = null) {
            const value = String(text || "");
            if (!value) return false;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(value);
                    return true;
                } catch (_) {}
            }

            const textarea = document.createElement("textarea");
            textarea.value = value;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.left = "-1000px";
            textarea.style.top = "-1000px";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            textarea.setSelectionRange(0, textarea.value.length);
            let copied = false;
            try {
                copied = document.execCommand("copy");
            } catch (_) {
                copied = false;
            }
            textarea.remove();
            if (copied) return true;

            if (selectElementText(sourceElement)) {
                try {
                    copied = document.execCommand("copy");
                } catch (_) {
                    copied = false;
                }
            }

            return copied;
        }

        function setPanelsVisible(visible) {
            managePanel.classList.toggle("hide", !visible);
            listPanel.classList.toggle("hide", !visible);
            if (!visible) cdkList.replaceChildren();
        }

        async function cdkRequest(action, payload = {}) {
            const response = await fetch("./api/cdk.php", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Cache-Control": "no-cache" },
                body: JSON.stringify({ action, admin_password: currentAdminPassword, ...payload }),
            });
            const result = await readJsonResponse(response);
            if (!response.ok || !result.success) throw new Error(result.message || "操作失败。");
            return result;
        }

        function resetForm() {
            cdkInput.value = "";
            titleInput.value = "";
            contentInput.value = "";
            enabledInput.checked = true;
            titleInput.focus();
        }

        function renderRecords(records) {
            cdkList.replaceChildren();
            const items = Array.isArray(records) ? records : [];
            if (!items.length) {
                const empty = document.createElement("div");
                empty.className = "empty";
                empty.textContent = "当前没有配置任何 CDK。";
                cdkList.append(empty);
                return;
            }

            items.forEach((item) => {
                const code = String(item.cdk || "");
                const title = String(item.title || "");
                const content = String(item.content || "");
                const enabled = Boolean(item.enabled);
                const sold = Boolean(item.sold);
                const firstClaimedAt = String(item.first_claimed_at || "");

                const row = document.createElement("div");
                row.className = "cdk-record";

                const info = document.createElement("div");
                info.className = "record-main";

                const head = document.createElement("div");
                head.className = "record-head";
                const codeEl = document.createElement("div");
                codeEl.className = "record-code";
                codeEl.textContent = code;
                const statusPill = document.createElement("span");
                statusPill.className = "status-pill" + (enabled ? "" : " off");
                statusPill.textContent = enabled ? "已启用" : "已停用";
                const saleSelect = document.createElement("select");
                saleSelect.className = "sale-select" + (sold ? " sold" : "");
                [
                    ["0", "未卖出"],
                    ["1", "已卖出"],
                ].forEach(([value, label]) => {
                    const option = document.createElement("option");
                    option.value = value;
                    option.textContent = label;
                    option.selected = sold ? value === "1" : value === "0";
                    saleSelect.append(option);
                });
                saleSelect.addEventListener("change", async () => {
                    const nextSold = saleSelect.value === "1";
                    saleSelect.disabled = true;
                    try {
                        const result = await cdkRequest("set_sold", { cdk: code, sold: nextSold });
                        renderRecords(result.data.records || []);
                        setStatus("success", nextSold ? "已标记为已卖出。" : "已标记为未卖出。");
                    } catch (error) {
                        saleSelect.value = sold ? "1" : "0";
                        saleSelect.className = "sale-select" + (sold ? " sold" : "");
                        setStatus("error", error.message || "售出状态保存失败。");
                    } finally {
                        saleSelect.disabled = false;
                    }
                });
                head.append(codeEl, statusPill, saleSelect);

                const summary = document.createElement("div");
                summary.className = "summary-grid";
                [
                    ["首次提取", firstClaimedAt || "未提取"],
                    ["售出状态", sold ? "已卖出" : "未卖出"],
                    ["标题", title || "无标题"],
                    ["内容长度", `${content.length} 字`],
                ].forEach(([label, value]) => {
                    const cell = document.createElement("div");
                    cell.className = "summary-cell";
                    const labelEl = document.createElement("div");
                    labelEl.className = "summary-label";
                    labelEl.textContent = label;
                    const valueEl = document.createElement("div");
                    valueEl.className = "summary-value";
                    valueEl.textContent = value;
                    cell.append(labelEl, valueEl);
                    summary.append(cell);
                });

                const preview = document.createElement("div");
                preview.className = "content-preview";
                preview.textContent = content || "暂无可查看信息。";
                info.append(head, summary, preview);

                const editBtn = document.createElement("button");
                editBtn.type = "button";
                editBtn.className = "secondary";
                editBtn.textContent = "编辑";
                editBtn.addEventListener("click", () => {
                    cdkInput.value = code;
                    titleInput.value = title;
                    contentInput.value = content;
                    enabledInput.checked = enabled;
                    contentInput.focus();
                    setStatus("", "已载入 CDK，可以修改后保存。");
                });

                const copyBtn = document.createElement("button");
                copyBtn.type = "button";
                copyBtn.className = "secondary";
                copyBtn.textContent = "复制 CDK";
                copyBtn.addEventListener("click", async (event) => {
                    event.preventDefault();
                    if (await copyText(code, codeEl)) {
                        setStatus("success", "CDK 已复制。");
                    } else {
                        selectElementText(codeEl);
                        setStatus("error", "复制失败，已选中 CDK，请按 Ctrl+C 或长按复制。");
                    }
                });

                const deleteBtn = document.createElement("button");
                deleteBtn.type = "button";
                deleteBtn.className = "danger";
                deleteBtn.textContent = "删除";
                deleteBtn.addEventListener("click", () => deleteRecord(code));

                const actions = document.createElement("div");
                actions.className = "record-actions";
                actions.append(copyBtn, editBtn, deleteBtn);

                row.append(info, actions);
                cdkList.append(row);
            });
        }

        async function deleteRecord(code) {
            if (!confirm(`确定删除 ${code} 吗？`)) return;
            try {
                const result = await cdkRequest("delete", { cdk: code });
                renderRecords(result.data.records || []);
                setStatus("success", "已删除。");
            } catch (error) {
                setStatus("error", error.message || "删除失败。");
            }
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const password = adminPasswordInput.value.trim();
            if (!password) return setStatus("error", "请输入管理员密码。");
            currentAdminPassword = password;
            loadBtn.disabled = true;
            loadBtn.textContent = "加载中...";
            try {
                const result = await cdkRequest("list");
                setPanelsVisible(true);
                renderRecords(result.data.records || []);
                setStatus("success", "CDK 管理已加载。");
            } catch (error) {
                currentAdminPassword = "";
                setPanelsVisible(false);
                setStatus("error", error.message || "登录失败。");
            } finally {
                loadBtn.disabled = false;
                loadBtn.textContent = "登录";
            }
        });

        cdkForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const cdk = cdkInput.value.trim().toUpperCase();
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            if (!title || !content) return setStatus("error", "请填写标题和卡密信息。");
            saveBtn.disabled = true;
            saveBtn.textContent = "保存中...";
            try {
                const result = await cdkRequest("save", { cdk, title, content, enabled: enabledInput.checked });
                renderRecords(result.data.records || []);
                resetForm();
                setStatus("success", cdk ? "CDK 已保存。" : "CDK 已自动生成并保存。");
            } catch (error) {
                setStatus("error", error.message || "保存失败。");
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = "保存 CDK";
            }
        });

        clearBtn.addEventListener("click", resetForm);
        setPanelsVisible(false);
    </script>
</body>
</html>
