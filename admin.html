<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>邮箱管理</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #eef2ef;
            --bg-2: #e1eae6;
            --panel: rgba(255, 253, 248, 0.94);
            --line: rgba(24, 38, 33, 0.12);
            --ink: #13211c;
            --muted: #5d6964;
            --accent: #0c6b5b;
            --accent-strong: #094e42;
            --soft: #edf5f1;
            --danger: #b23333;
            --info: #245c78;
            --shadow: 0 28px 70px rgba(20, 33, 29, 0.13);
        }
        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            color: var(--ink);
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background:
                linear-gradient(135deg, rgba(12, 107, 91, 0.11), transparent 33%),
                linear-gradient(320deg, rgba(154, 100, 16, 0.08), transparent 30%),
                linear-gradient(180deg, var(--bg), var(--bg-2));
        }
        main {
            width: min(1080px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 16px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 22px;
            backdrop-filter: blur(10px);
        }
        .top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: end;
        }
        h1, h2 {
            margin: 0 0 8px;
            letter-spacing: 0;
        }
        h1 { font-size: clamp(28px, 4vw, 42px); line-height: 1.06; }
        h2 { font-size: 22px; }
        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.75;
        }
        code {
            padding: 0 6px;
            border-radius: 4px;
            background: #edf4f0;
            color: var(--accent-strong);
        }
        a {
            color: var(--accent-strong);
            text-decoration: none;
            font-weight: 800;
        }
        a:hover { text-decoration: underline; }
        form { display: grid; gap: 14px; }
        .grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto auto;
            gap: 12px;
            align-items: end;
        }
        .login-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: end;
        }
        label {
            display: grid;
            gap: 7px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }
        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            color: var(--ink);
            padding: 13px 14px;
            font-size: 15px;
            outline: none;
        }
        input:focus {
            border-color: rgba(12, 107, 91, 0.45);
            box-shadow: 0 0 0 3px rgba(12, 107, 91, 0.12);
        }
        button {
            border: 0;
            border-radius: 8px;
            background: linear-gradient(180deg, var(--accent), var(--accent-strong));
            color: #fff;
            padding: 14px 18px;
            min-height: 46px;
            font-weight: 900;
            cursor: pointer;
            white-space: nowrap;
        }
        button:hover { filter: brightness(1.02); }
        button:disabled { opacity: .62; cursor: not-allowed; }
        button.secondary {
            background: #e7f2ee;
            color: var(--accent-strong);
            border: 1px solid rgba(12, 107, 91, 0.18);
        }
        button.danger { background: var(--danger); }
        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 14px;
            margin-top: 12px;
            line-height: 1.6;
        }
        .status.success { color: var(--accent-strong); }
        .status.error { color: var(--danger); }
        .status.info { color: var(--info); }
        .hide { display: none; }
        .list-tools {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .filter-label {
            width: min(260px, 100%);
        }
        select.filter-select {
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            color: var(--ink);
            padding: 0 12px;
            font-size: 14px;
            font-weight: 900;
            outline: none;
        }
        select.filter-select:focus {
            border-color: rgba(12, 107, 91, 0.45);
            box-shadow: 0 0 0 3px rgba(12, 107, 91, 0.12);
        }
        .list {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }
        .item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: stretch;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 16px;
            background: linear-gradient(180deg, rgba(237, 245, 241, 0.96), rgba(247, 250, 248, 0.96));
        }
        .item-main {
            min-width: 0;
            display: grid;
            gap: 8px;
        }
        .item-head {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .email {
            word-break: break-all;
            font-weight: 900;
            font-size: 18px;
            line-height: 1.25;
        }
        .account-meta {
            display: grid;
            gap: 6px;
        }
        .account-secret {
            color: var(--muted);
            font-size: 13px;
            word-break: break-all;
            line-height: 1.55;
        }
        .account-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
        }
        .account-actions button {
            min-height: 40px;
            padding: 0 14px;
            box-shadow: none;
        }
        .add-cdk {
            background: linear-gradient(180deg, #f5f2e8, #eadfca);
            color: #6b4b09;
            border: 1px solid rgba(154, 100, 16, 0.18);
        }
        .add-cdk:disabled {
            opacity: .65;
        }
        .used-toggle.used {
            border-color: rgba(36, 92, 120, 0.18);
            color: var(--info);
            background: #e8f3f8;
        }
        .empty {
            color: var(--muted);
            padding: 12px 0;
        }
        .note {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
            margin-top: 12px;
        }
        .password-field {
            display: grid;
            gap: 8px;
        }
        .password-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .password-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.82);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        @media (max-width: 860px) {
            .top,
            .login-grid,
            .grid,
            .item {
                grid-template-columns: 1fr;
                display: grid;
            }
            .account-actions {
                justify-content: flex-start;
            }
            .list-tools { display: grid; }
        }
        @media (max-width: 640px) {
            body { padding: 16px; }
            .panel { padding: 18px; }
            .toolbar { display: grid; }
            button { width: 100%; }
        }
    </style>
    <link rel="stylesheet" href="./assets/app.css" />
</head>
<body>
    <main>
        <section class="panel top">
            <div>
                <h1>邮箱管理台</h1>
                <p>用于维护可查询验证码的邮箱账号，以及对应的查询密码。</p>
            </div>
            <div class="toolbar">
                <a href="./cdk.html">CDK 信息提取</a>
                <a href="./cdk-admin.html">CDK 管理</a>
                <a href="./debug.html">邮箱调试</a>
                <a href="./privacy.html">添加隐私邮箱</a>
                <a href="./index.html">返回查询页</a>
            </div>
        </section>

        <section class="panel">
            <h2>管理员登录</h2>
            <p>请输入 <code>config/mail.php</code> 中的管理员密码。</p>
            <form id="loginForm" autocomplete="off">
                <div class="login-grid">
                    <label>管理员密码
                        <input id="adminPassword" type="password" autocomplete="new-password" required />
                    </label>
                    <button id="loadBtn" type="submit">登录</button>
                </div>
            </form>
            <div id="status" class="status">等待登录。</div>
        </section>

        <section id="managePanel" class="panel hide">
            <h2>添加或更新账号</h2>
            <p>保存会覆盖该邮箱现有的查询密码，系统会按原有方式存储密码哈希。</p>
            <form id="accountForm" autocomplete="off">
                <div class="grid">
                    <label>邮箱
                        <input id="emailInput" type="email" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="name@example.com" required />
                    </label>
                    <label class="password-field">查询密码
                        <input id="passwordInput" type="text" autocomplete="new-password" required />
                    </label>
                    <button id="saveBtn" type="submit">保存</button>
                    <button id="generateBtn" class="secondary" type="button">重新生成</button>
                </div>
            </form>
            <div class="note">查询密码会自动生成，内容由字母和数字组成。保存前你也可以手动修改。</div>
        </section>

        <section id="listPanel" class="panel hide">
            <h2>已配置账号</h2>
            <div class="list-tools">
                <label class="filter-label">使用状态
                    <select id="usedFilter" class="filter-select">
                        <option value="all">全部</option>
                        <option value="unused">未使用</option>
                        <option value="used">已使用</option>
                    </select>
                </label>
            </div>
            <div id="accountList" class="list"></div>
        </section>
    </main>
    <script>
        const loginForm = document.getElementById("loginForm");
        const accountForm = document.getElementById("accountForm");
        const adminPasswordInput = document.getElementById("adminPassword");
        const emailInput = document.getElementById("emailInput");
        const passwordInput = document.getElementById("passwordInput");
        const loadBtn = document.getElementById("loadBtn");
        const saveBtn = document.getElementById("saveBtn");
        const generateBtn = document.getElementById("generateBtn");
        const statusEl = document.getElementById("status");
        const managePanel = document.getElementById("managePanel");
        const listPanel = document.getElementById("listPanel");
        const accountList = document.getElementById("accountList");
        const usedFilter = document.getElementById("usedFilter");
        let currentAdminPassword = "";
        let currentAccounts = [];

        function setStatus(type, message) {
            statusEl.className = "status" + (type ? " " + type : "");
            statusEl.textContent = message;
        }

        async function readJsonResponse(response) {
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (_) {
                const detail = text.trim().slice(0, 160);
                throw new Error(detail ? `接口返回异常：${detail}` : "接口返回异常，请检查服务器日志。");
            }
        }

        async function copyText(text) {
            const value = String(text || "");
            if (!value) return false;

            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(value);
                    return true;
                } catch (_) {}
            }

            const textarea = document.createElement("textarea");
            textarea.value = value;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.left = "-1000px";
            textarea.style.top = "-1000px";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            textarea.setSelectionRange(0, textarea.value.length);
            let copied = false;
            try {
                copied = document.execCommand("copy");
            } catch (_) {
                copied = false;
            }
            textarea.remove();
            return copied;
        }

        function generatePassword(length = 16) {
            const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";
            const bytes = new Uint8Array(length);
            crypto.getRandomValues(bytes);
            let value = "";
            for (const byte of bytes) {
                value += alphabet[byte % alphabet.length];
            }
            return value;
        }

        function preparePassword() {
            passwordInput.value = generatePassword();
            passwordInput.type = "text";
        }

        function buildCdkTitle() {
            return "账号 -密码-邮箱接码地址-邮件查询密码";
        }

        function buildQueryUrl(email, password) {
            const url = new URL("./index.html", window.location.href);
            const params = new URLSearchParams();
            params.set("email", email);
            params.set("access_password", password);
            params.set("auto", "1");
            url.hash = params.toString();
            return url.toString();
        }

        function setPanelsVisible(visible) {
            managePanel.classList.toggle("hide", !visible);
            listPanel.classList.toggle("hide", !visible);
            if (!visible) {
                accountList.replaceChildren();
            } else {
                preparePassword();
            }
        }

        async function adminRequest(action, payload = {}) {
            const response = await fetch("./api/admin.php", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Cache-Control": "no-cache" },
                body: JSON.stringify({ action, admin_password: currentAdminPassword, ...payload }),
            });
            const result = await readJsonResponse(response);
            if (!response.ok || !result.success) throw new Error(result.message || "操作失败。");
            return result;
        }

        function renderAccounts(accounts) {
            accountList.replaceChildren();
            currentAccounts = Array.isArray(accounts) ? accounts : [];
            const filter = usedFilter ? usedFilter.value : "all";
            const items = currentAccounts.filter((item) => {
                const used = Boolean(item && item.used);
                if (filter === "used") return used;
                if (filter === "unused") return !used;
                return true;
            });
            if (!items.length) {
                const empty = document.createElement("div");
                empty.className = "empty";
                empty.textContent = currentAccounts.length ? "当前筛选条件下没有账号。" : "当前没有配置任何账号。";
                accountList.append(empty);
                return;
            }

            items.forEach((item) => {
                const email = String(item.email || "");
                const password = String(item.access_password || "");
                const used = Boolean(item.used);

                const row = document.createElement("div");
                row.className = "item";

                const metaEl = document.createElement("div");
                metaEl.className = "account-meta";
                const emailEl = document.createElement("div");
                emailEl.className = "email";
                emailEl.textContent = email;
                const secretEl = document.createElement("div");
                secretEl.className = "account-secret";
                secretEl.textContent = password ? `密钥：${password}` : "密钥：已隐藏";
                metaEl.append(emailEl, secretEl);

                const usedBtn = document.createElement("button");
                usedBtn.type = "button";
                usedBtn.className = "secondary used-toggle" + (used ? " used" : "");
                usedBtn.textContent = used ? "已使用" : "未使用";
                usedBtn.title = used ? "点击标记为未使用" : "点击标记为已使用";
                usedBtn.addEventListener("click", async () => {
                    try {
                        const result = await adminRequest("set_used", { email, used: !used });
                        renderAccounts(result.data.accounts || []);
                        setStatus("success", used ? "已标记为未使用。" : "已标记为已使用。");
                    } catch (error) {
                        setStatus("error", error.message || "状态更新失败。");
                    }
                });

                const addCdkBtn = document.createElement("button");
                addCdkBtn.type = "button";
                addCdkBtn.className = "add-cdk";
                addCdkBtn.textContent = "添加到CDK";
                addCdkBtn.addEventListener("click", async () => {
                    addCdkBtn.disabled = true;
                    try {
                        const result = await adminRequest("add_to_cdk", {
                            email,
                            source_password: password,
                            title: buildCdkTitle(),
                            url: "http://49.51.182.250:8090/index.html",
                        });
                        renderAccounts(result.data.accounts || []);
                        setStatus("success", "已添加到 CDK 列表。");
                    } catch (error) {
                        setStatus("error", error.message || "添加到 CDK 失败。");
                    } finally {
                        addCdkBtn.disabled = false;
                    }
                });

                const copyBtn = document.createElement("button");
                copyBtn.type = "button";
                copyBtn.className = "secondary";
                copyBtn.textContent = "复制账号和密码";
                copyBtn.addEventListener("click", async () => {
                    const text = `${email}\t${password}`;
                    if (await copyText(text)) {
                        setStatus("success", "已复制账号和密码。");
                    } else {
                        setStatus("error", "复制失败，请手动选择文本。");
                    }
                });

                const queryUrlBtn = document.createElement("button");
                queryUrlBtn.type = "button";
                queryUrlBtn.className = "secondary";
                queryUrlBtn.textContent = "生成接码查询地址";
                queryUrlBtn.addEventListener("click", async () => {
                    if (!email || !password) {
                        setStatus("error", "该账号缺少邮箱或查询密码，无法生成查询地址。");
                        return;
                    }
                    const url = buildQueryUrl(email, password);
                    if (await copyText(url)) {
                        setStatus("success", "接码查询地址已生成并复制。");
                    } else {
                        setStatus("error", "复制失败，请手动选择文本。");
                    }
                });

                const editBtn = document.createElement("button");
                editBtn.type = "button";
                editBtn.className = "secondary";
                editBtn.textContent = "编辑密码";
                editBtn.addEventListener("click", () => {
                    emailInput.value = email;
                    preparePassword();
                    passwordInput.focus();
                    setStatus("info", "已为该邮箱生成新的查询密码，可以直接保存或继续修改。");
                });

                const deleteBtn = document.createElement("button");
                deleteBtn.type = "button";
                deleteBtn.className = "danger";
                deleteBtn.textContent = "删除";
                deleteBtn.addEventListener("click", () => deleteAccount(email));

                const actions = document.createElement("div");
                actions.className = "account-actions";
                actions.append(usedBtn, addCdkBtn, copyBtn, queryUrlBtn, editBtn, deleteBtn);

                row.append(metaEl, actions);
                accountList.append(row);
            });
        }

        async function deleteAccount(email) {
            if (!confirm(`确定删除 ${email} 吗？`)) return;
            try {
                const result = await adminRequest("delete", { email });
                renderAccounts(result.data.accounts || []);
                setStatus("success", "已删除。");
            } catch (error) {
                setStatus("error", error.message || "删除失败。");
            }
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const password = adminPasswordInput.value.trim();
            if (!password) return setStatus("error", "请输入管理员密码。");

            currentAdminPassword = password;
            loadBtn.disabled = true;
            loadBtn.textContent = "加载中...";
            try {
                const result = await adminRequest("list");
                setPanelsVisible(true);
                renderAccounts(result.data.accounts || []);
                setStatus("success", "管理后台已加载。");
            } catch (error) {
                currentAdminPassword = "";
                setPanelsVisible(false);
                setStatus("error", error.message || "登录失败。");
            } finally {
                loadBtn.disabled = false;
                loadBtn.textContent = "登录";
            }
        });

        accountForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            if (!email || !password) return setStatus("error", "请填写邮箱和查询密码。");

            saveBtn.disabled = true;
            saveBtn.textContent = "保存中...";
            try {
                const result = await adminRequest("save", { email, access_password: password });
                renderAccounts(result.data.accounts || []);
                emailInput.value = "";
                preparePassword();
                emailInput.focus();
                setStatus("success", "已保存。");
            } catch (error) {
                setStatus("error", error.message || "保存失败。");
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = "保存";
            }
        });

        generateBtn.addEventListener("click", () => {
            preparePassword();
            passwordInput.focus();
            setStatus("info", "已重新生成查询密码。");
        });

        if (usedFilter) {
            usedFilter.addEventListener("change", () => renderAccounts(currentAccounts));
        }

        setPanelsVisible(false);
    </script>
</body>
</html>
